  <text x="1190" y="211" class="boxTitle">Step2 RCI Agent</text>
  <text x="1190" y="234" class="boxText">root cause, anchors, predicates</text>
  <text x="1190" y="253" class="boxText">guards and trigger conditions</text>
  <text x="1190" y="272" class="boxText">RepoMaster navigation hints</text>

  <rect x="1450" y="185" width="245" height="105" rx="8" class="detN"/>
