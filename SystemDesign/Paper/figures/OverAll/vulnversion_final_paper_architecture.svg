  <text x="700" y="234" class="boxText">vulnerable chunk recognition</text>
  <text x="700" y="253" class="boxText">chunk role annotation</text>
  <text x="700" y="272" class="boxText">primary and supporting fixes</text>

  <rect x="925" y="185" width="210" height="105" rx="8" class="artifactN"/>
  <text x="945" y="211" class="boxTitle">patch_semantics.json</text>
  <text x="945" y="234" class="boxText">all chunks and roles</text>
  <text x="945" y="253" class="boxText">RCI relevant chunks</text>
