  <rect width="2100" height="1500" fill="#ffffff"/>
  <text x="55" y="55" class="title">VulnVersion Final Target Architecture</text>
  <text x="55" y="84" class="subtitle">Paper-level final design integrating the implemented three-stage pipeline, Step3 target optimizations, backend-agnostic runtime, typed memory, and verifier-gated self-evolution.</text>

