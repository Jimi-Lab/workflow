  <rect x="50" y="910" width="310" height="210" rx="12" class="ruleG"/>
  <text x="70" y="940" class="groupLabel">Design Boundaries</text>
  <rect x="75" y="970" width="260" height="38" rx="6" class="ruleN"/>
  <text x="92" y="994" class="boxText">Agent is not tag planner</text>
  <rect x="75" y="1018" width="260" height="38" rx="6" class="ruleN"/>
  <text x="92" y="1042" class="boxText">Planning and ASBS are deterministic</text>
  <rect x="75" y="1066" width="260" height="38" rx="6" class="ruleN"/>
  <text x="92" y="1090" class="boxText">Memory is typed and verifier gated</text>

  <rect x="50" y="1175" width="2000" height="210" rx="12" fill="#fafafa" stroke="#cccccc" stroke-width="1"/>
  <text x="70" y="1205" class="groupLabel">Final Target Flow Summary</text>
  <text x="80" y="1240" class="boxText">Inputs flow through Step1 semantic patch aggregation, Step2 root cause and RCI extraction, and Step3 final version impact confirmation.</text>
  <text x="80" y="1265" class="boxText">Step3 is modeled as deterministic release-version graph planning plus evidence-backed tag verdict probes. BAPEE improves line-local FIC and VIC recovery only after standalone evaluation, precision gating, and ASBS guard checks.</text>
  <text x="80" y="1290" class="boxText">AgentRuntime abstracts OpenCode, Claude Code, Codex, and Replay backends. ReplayRuntime supports no-API reproduction, regression tests, and prompt or memory change comparison.</text>
  <text x="80" y="1315" class="boxText">VulnMem is not generic RAG. It is a typed memory system covering WorkingMemory, EvidenceMemory, RepoMemory, RCIMemory, LineMemory, FailureMemory, ProceduralMemory, SkillMemory, and ArtifactMemory.</text>
  <text x="80" y="1340" class="boxText">Self-evolution uses traces, eval outputs, hard cases, memory operation skills, verifier gates, and controlled injection to improve prompts, skills, and deterministic artifacts without leaking ground truth affected tags.</text>

